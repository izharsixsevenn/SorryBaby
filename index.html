<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    text-align:center;
    overflow-x:hidden;
    background: linear-gradient(to bottom, #2b0000, #5a0000);
}

/* TITLE */
h1{
    font-family:'Parisienne',cursive;
    font-size:56px;
    color:#ff2e2e;
    margin-top:20px;
}

/* HEARTS */
.heart{
    position:fixed;
    top:-10px;
    color:rgba(255,80,80,0.8);
    font-size:20px;
    animation:fall linear infinite;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

/* BUTTONS */
button{
    font-family:'Poppins',sans-serif;
    font-size:15px;
    border:none;
    padding:8px 16px;
    margin:5px;
    border-radius:20px;
    cursor:pointer;
}

.yes{background:#ff2e2e;color:white;}
.no{background:#ddd;position:relative;}

/* CARD (NO BLOCKING EVER) */
.card{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:99999;

    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    max-width:600px;
    width:85%;
}

.script{
    font-family:'Great Vibes',cursive;
    font-size:30px;
    color:#7a0000;
    line-height:1.8;
}

/* FLOWERS */
.flower{
    position:fixed;
    bottom:-60px;
    font-size:40px;
    animation:floatUp 4s ease-out forwards;
    pointer-events:none;
}
@keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.5);}
    30%{opacity:1;}
    100%{opacity:0; transform:translateY(-120vh) scale(1.2);}
}

/* BOWS */
.bow{
    position:fixed;
    top:-40px;
    font-size:32px;
    animation:bowFall 5s linear forwards;
    pointer-events:none;
}
@keyframes bowFall{
    to{transform:translateY(110vh) rotate(360deg); opacity:0;}
}

</style>
</head>

<body>

<h1>I'm Sorry ❤️</h1>

<audio id="music" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎶 Play / Pause Music</button>

<!-- APOLOGY CARD (ONLY MAIN UI) -->
<div class="card" id="card">
<p class="script">
I’m truly sorry for what I did.<br><br>
I never meant to hurt you or make you feel unimportant.<br><br>
You mean everything to me, and I hope you can forgive me.<br><br>
Please don’t leave me like this ❤️
</p>

<button class="yes" onclick="startFlowers('❤️')">Forgive Me ❤️</button>
<button class="no" onmouseover="moveNo(this)">No 😢</button>
</div>

<script>

/* HEARTS */
for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=3+Math.random()*5+"s";
    document.body.appendChild(h);
}

/* MUSIC */
function toggleMusic(){
    let m=document.getElementById("music");
    if(m.paused){
        m.volume=0.5;
        m.play();
    }else{
        m.pause();
    }
}

/* NO BUTTON MOVE */
function moveNo(btn){
    const x=(Math.random()*200)-100;
    const y=(Math.random()*100)-50;
    btn.style.transform=translate(${x}px,${y}px);
}

/* FLOWERS */
let flowerInterval;
function startFlowers(type){
    if(flowerInterval) clearInterval(flowerInterval);

    flowerInterval=setInterval(()=>{
        let f=document.createElement("div");
        f.className="flower";
        f.innerHTML=type;
        f.style.left=Math.random()*100+"vw";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),4000);
    },400);
}

/* FLOWERS STYLE (added dynamically support) */
const style=document.createElement("style");
style.innerHTML=`
.flower{
    position:fixed;
    bottom:-60px;
    font-size:40px;
    animation:floatUp 4s ease-out forwards;
    pointer-events:none;
}
@keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.5);}
    30%{opacity:1;}
    100%{opacity:0; transform:translateY(-120vh) scale(1.2);}
}
`;
document.head.appendChild(style);

</script>

</body>
</html>

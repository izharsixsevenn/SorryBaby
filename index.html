<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgive Me 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to bottom, #f7b6c2, #fcd3da);
    font-family: Arial, sans-serif;
}

/* CARD */
.card {
    background: #ffe6ea;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.emoji { font-size: 60px; }

h1 { color: #e75480; }

#message {
    font-size: 14px;
    color: #555;
    min-height: 40px;
    margin: 15px 0;
}

/* BUTTONS */
.btn-container {
    display: flex;
    justify-content: space-between;
    gap: 15px;
    margin-top: 20px;
}

#yesBtn, #noBtn {
    flex: 1;
    background: #ff8fa3;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.15s;
}

#yesBtn:hover {
    background: #ff5c7a;
}

/* HEARTS */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear forwards;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* HEART BURST */
.burst {
    position: absolute;
    font-size: 24px;
    animation: pop 1s ease-out forwards;
}

@keyframes pop {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}
</style>
</head>

<body>

<div class="card" id="card">
    <div class="emoji">😭</div>
    <h1>Will you forgive me?</h1>
    <div id="message"></div>

    <div class="btn-container">
        <button id="yesBtn" onclick="forgive()">Yes 💕</button>
        <button id="noBtn" onmouseover="moveNo()">No 😢</button>
    </div>
</div>

<audio id="bgm" loop>
    <source src="https://www.myinstants.com/media/sounds/anime-wow-sound-effect.mp3">
</audio>

<script>

/* TYPE TEXT */
const intro = "I’m really sorry... I didn’t mean to hurt you 🥺";
let i = 0;

function typeIntro() {
    if (i < intro.length) {
        document.getElementById("message").innerHTML += intro[i++];
        setTimeout(typeIntro, 40);
    }
}
typeIntro();

/* YES CLICK */
function forgive() {
    const audio = document.getElementById("bgm");

    audio.play().catch(()=>{});
    audio.volume = 0;

    let vol = 0;
    const fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            audio.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 100);

    const card = document.getElementById("card");

    card.innerHTML = `
        <div style="font-size:55px;">💌</div>
        <h2 style="color:#e75480;">For You...</h2>
        <p id="letter"></p>
    `;

    const text = "I know I hurt you... I'm really sorry 🥺 You matter so much to me. I just want us to be okay again 💖";

    let j = 0;
    function typeLetter() {
        if (j < text.length) {
            document.getElementById("letter").innerHTML += text[j++];
            setTimeout(typeLetter, 35);
        }
    }
    typeLetter();

    document.getElementById("noBtn").style.display = "none";

    heartBurst();
}

/* NO BUTTON MOVE (SMALL ESCAPE EFFECT) */
function moveNo() {
    const btn = document.getElementById("noBtn");

    const x = (Math.random() * 20) - 10;
    const y = (Math.random() * 20) - 10;

    btn.style.transform = translate(${x}px, ${y}px) scale(0.95);
}

/* HEART RAIN */
function heart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}
setInterval(heart, 250);

/* HEART BURST */
function heartBurst() {
    for (let i = 0; i < 25; i++) {
        const h = document.createElement("div");
        h.className = "burst";
        h.innerHTML = "💖";

        h.style.left = (50 + Math.random() * 10 - 5) + "vw";
        h.style.top = (50 + Math.random() * 10 - 5) + "vh";

        document.body.appendChild(h);
        setTimeout(() => h.remove(), 1000);
    }
}

</script>

</body>
</html>

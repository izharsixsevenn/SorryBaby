<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Parisienne&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    text-align:center;
    overflow-x:hidden;
    background: linear-gradient(to bottom, #2b0000, #5a0000);
}

/* TITLE */
h1{
    font-family:'Parisienne',cursive;
    font-size:56px;
    color:#ff2e2e;
    margin-top:20px;
}

/* HEARTS */
.heart{
    position:fixed;
    top:-10px;
    color:rgba(255,80,80,0.8);
    font-size:20px;
    animation:fall linear infinite;
}
@keyframes fall{
    to{transform:translateY(110vh);}
}

/* ENVELOPE WRAPPER (CENTERED + SAFE SPACE) */
.envelope-wrapper{
    display:flex;
    justify-content:center;
    margin:30px auto;
    transition:0.6s ease;
    position:relative;
    z-index:1;
}

/* BIGGER ENVELOPE FIX */
.envelope{
    width:420px;
    height:280px;
    background:#7a0000;
    position:relative;
    cursor:pointer;
    border-radius:16px;
    transition: transform 0.4s ease;
}

/* FLAP */
.flap{
    position:absolute;
    inset:0;
    background:#a30000;
    clip-path:polygon(0 0,100% 0,50% 55%);
    transform-origin:top;
    transition:transform 0.9s ease;
    z-index:3;
}

/* LETTER */
.letter{
    position:absolute;
    inset:25px;
    background:white;
    border-radius:14px;
    padding:20px;
    font-family:'Great Vibes',cursive;
    font-size:26px;
    color:#5a0000;
    line-height:1.4;
    z-index:2;
}

/* OPEN ANIMATION */
.envelope.open .flap{
    transform:rotateX(180deg);
}

/* BUTTONS */
button{
    font-family:'Poppins',sans-serif;
    font-size:15px;
    border:none;
    padding:8px 16px;
    margin:5px;
    border-radius:20px;
    cursor:pointer;
}

.yes{background:#ff2e2e;color:white;}
.no{background:#ddd;position:relative;}

/* APOLOGY CARD (NO BLOCKING EVER) */
.card{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:99999;

    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.6);
    max-width:600px;
    width:85%;
}

.script{
    font-family:'Great Vibes',cursive;
    font-size:30px;
    color:#7a0000;
    line-height:1.8;
}

/* FLOWERS */
.flower{
    position:fixed;
    bottom:-60px;
    font-size:40px;
    animation:floatUp 4s ease-out forwards;
    pointer-events:none;
}
@keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.5);}
    30%{opacity:1;}
    100%{opacity:0; transform:translateY(-120vh) scale(1.2);}
}

/* BOWS */
.bow{
    position:fixed;
    top:-40px;
    font-size:32px;
    animation:bowFall 5s linear forwards;
    pointer-events:none;
}
@keyframes bowFall{
    to{transform:translateY(110vh) rotate(360deg); opacity:0;}
}

#flowerSelector{
    display:none;
}
</style>
</head>

<body>

<h1>I'm Sorry ❤️</h1>

<audio id="music" loop>
  <source src="love.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">🎶 Play / Pause Music</button>

<!-- ENVELOPE -->
<div class="envelope-wrapper" id="envWrap">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="letter">
            <p>I’m really sorry... 🥺</p>
            <button class="yes" onclick="answerYes()">Forgive Me ❤️</button>
            <button class="no" onmouseover="moveNo(this)">No 😢</button>
        </div>
    </div>
</div>

<!-- FLOWER SELECTOR -->
<div id="flowerSelector">
  <button onclick="startFlowers('❤️')" class="yes">Hearts ❤️</button>
  <button onclick="startFlowers('🌹')" class="yes">Roses 🌹</button>
  <button onclick="startFlowers('💔')" class="yes">Broken Hearts 💔</button>
</div>

<!-- APOLOGY CARD -->
<div class="card" id="card">
<p class="script">
I’m truly sorry for what I did.<br><br>
I never meant to hurt you or make you feel unimportant.<br><br>
You mean everything to me, and I hope you can forgive me.<br><br>
Please don’t leave me like this ❤️
</p>
</div>

<script>

/* HEARTS */
for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=3+Math.random()*5+"s";
    document.body.appendChild(h);
}

/* MUSIC */
function toggleMusic(){
    let m=document.getElementById("music");
    if(m.paused){
        m.volume=0.5;
        m.play();
    }else{
        m.pause();
    }
}

/* ENVELOPE OPEN */
function answerYes(){
    const envelope=document.getElementById("envelope");
    const wrap=document.getElementById("envWrap");

    envelope.classList.add("open");

    const music=document.getElementById("music");
    music.volume=0.5;
    music.play();

    showBows();
    startFlowers('❤️');

    document.getElementById("flowerSelector").style.display="block";

    setTimeout(()=>{
        wrap.style.opacity="0";
        wrap.style.pointerEvents="none";
        wrap.style.transform="scale(0)";
        document.getElementById("card").style.display="block";
    },900);
}

/* NO BUTTON */
function moveNo(btn){
    btn.style.position="absolute";
    btn.style.left=Math.random()*200+"px";
    btn.style.top=Math.random()*100+"px";
}

/* FLOWERS */
let flowerInterval;
function startFlowers(type){
    if(flowerInterval) clearInterval(flowerInterval);

    flowerInterval = setInterval(()=>{
        let f=document.createElement("div");
        f.className="flower";
        f.innerHTML=type;
        f.style.left=Math.random()*100+"vw";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),4000);
    },500);
}

/* BOWS */
function showBows(){
    for(let i=0;i<12;i++){
        let b=document.createElement("div");
        b.className="bow";
        b.innerHTML="🎀";
        b.style.left=Math.random()*100+"vw";
        document.body.appendChild(b);
        setTimeout(()=>b.remove(),5000);
    }
}

</script>

</body>
</html>
